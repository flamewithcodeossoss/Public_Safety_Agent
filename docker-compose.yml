services:
  # ── Backend — FastAPI + LangGraph + DuckDB ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marassi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - OLLAMA_MODEL=RogerBen/qwen3.5-35b-opus-distill:latest
      - OLLAMA_BASE_URL=http://192.168.1.145:11434
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; print(httpx.get('http://localhost:8000/api/health').status_code)"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ── Frontend — React + Vite Dashboard ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marassi_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
